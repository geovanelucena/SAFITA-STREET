<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
/>

<title>SAFITA STREET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
rel="stylesheet"
/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100dvh;
    overflow:hidden;
    background:#000;
    font-family:"Press Start 2P", monospace;
    touch-action:none;
}

#gameContainer{
    position:fixed;
    inset:0;

    width:100vw;
    height:100dvh;

    overflow:hidden;
    background:#000;
}

canvas{
    width:100vw;
    height:100dvh;
    display:block;

    image-rendering:pixelated;
    image-rendering:crisp-edges;
}

#startScreen{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:#000;

    pointer-events:auto;
    touch-action:auto;

    z-index:9999;
}

#logoStart{

    width:80%;
    max-width:520px;

    image-rendering:pixelated;

}

#startText{

    margin-top:40px;

    color:#fff;

    border:4px solid #fff;

    padding:18px 24px;

    font-size:16px;

    animation:blink .8s infinite;

    box-shadow:6px 6px 0 #fff;

}

@keyframes blink{

    0%{opacity:1;}
    50%{opacity:.3;}
    100%{opacity:1;}

}

.ui{

    position:absolute;

    left:50%;
    top:52%;

    transform:translate(-50%,-50%);

    display:none;

    flex-direction:column;

    align-items:center;

    gap:14px;

    z-index:50;

}

.pixelInput{

    width:260px;

    padding:14px;

    background:#111;

    border:3px solid #fff;

    color:#fff;

    font-family:"Press Start 2P", monospace;

    text-align:center;

    font-size:10px;

    outline:none;

}

.pixelBtn{

    width:260px;

    padding:16px;

    border:3px solid #fff;

    background:#111;

    color:#fff;

    cursor:pointer;

    font-family:"Press Start 2P", monospace;

    font-size:10px;

    box-shadow:5px 5px 0 #fff;

}

#leaderboard{

    position:absolute;

    top:90px;
    right:10px;

    width:220px;

    background:rgba(0,0,0,.75);

    border:3px solid #fff;

    padding:12px;

    display:none;

    color:#fff;

    z-index:40;

    box-shadow:5px 5px 0 #fff;

}

#leaderboard h2{

    text-align:center;
    margin-bottom:12px;
    font-size:10px;

}

#rankingList{

    padding-left:16px;

}

#rankingList li{

    margin-bottom:10px;
    font-size:7px;
    line-height:1.8;

}

@media(max-width:900px){

    .ui{

        top:46%;
        gap:10px;

    }

    .pixelBtn,
    .pixelInput{

        width:220px;
        padding:12px;
        font-size:7px;

    }

    #leaderboard{

        width:140px;

        top:70px;
        right:8px;

        padding:8px;

    }

    #leaderboard h2{

        font-size:8px;
        margin-bottom:8px;

    }

    #rankingList li{

        font-size:5px;
        margin-bottom:6px;

    }

    #startText{

        font-size:10px;
        padding:14px 16px;

    }

}

</style>

</head>

<body>

<div id="gameContainer">

    <div id="startScreen">

        <img
        src="img/safita-logo-pixel.png"
        id="logoStart"
        >

        <div id="startText">
            TOQUE PARA COMEÇAR
        </div>

    </div>

    <canvas id="game"></canvas>

    <div id="gameOverUI" class="ui">

        <input
        type="text"
        id="nameInput"
        class="pixelInput"
        placeholder="SEU NOME"
        >

        <button id="saveBtn" class="pixelBtn">
            SALVAR RANK
        </button>

        <button id="shareBtn" class="pixelBtn">
            COMPARTILHAR SCORE
        </button>

        <button id="gangBtn" class="pixelBtn">
            ENTRAR PRA GANG
        </button>

        <button id="restartBtn" class="pixelBtn">
            JOGAR NOVAMENTE
        </button>

    </div>

    <div id="leaderboard">

        <h2>TOP 5</h2>

        <ol id="rankingList"></ol>

    </div>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

function resizeCanvas(){

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

const mobile =
window.innerWidth < 900;

const startScreen =
document.getElementById("startScreen");

const leaderboardDiv =
document.getElementById("leaderboard");

const gameOverUI =
document.getElementById("gameOverUI");

const restartBtn =
document.getElementById("restartBtn");

const saveBtn =
document.getElementById("saveBtn");

const shareBtn =
document.getElementById("shareBtn");

const gangBtn =
document.getElementById("gangBtn");

const nameInput =
document.getElementById("nameInput");

/* IMAGENS */

const remo1Img = new Image();
remo1Img.src = "img/remo1.png";

const remo2Img = new Image();
remo2Img.src = "img/remo2.png";

const jumpImg = new Image();
jumpImg.src = "img/pulo.png";

const deadImg = new Image();
deadImg.src = "img/queda.png";

const bgImg = new Image();
bgImg.src = "img/background.png";

const vt1 = new Image();
vt1.src = "img/vt1.png";

const vt2 = new Image();
vt2.src = "img/vt2.png";

/* AUDIO */

const music =
new Audio("audio/game.mp3");

music.loop = true;
music.volume = 0.3;

const sirene =
new Audio("audio/sirene.mp3");

sirene.loop = true;
sirene.volume = 0.06;

const jumpSound =
new Audio("audio/jump.mp3");

const hitSound =
new Audio("audio/hit.mp3");

/* GAME */

let gameStarted = false;

let gameOver = false;

let score = 0;

let speed = 7;

let gravity = 1.1;

let bgX = 0;

let animationFrame;

let walkFrame = 0;

let walkTimer = 0;

let policeFrame = 0;

let policeTimer = 0;

let obstacles = [];

let showDead = false;

/* PLAYER */

const player = {

    x:80,

    y:0,

    width:118,

    height:118,

    velocityY:0,

    jumping:false

};

function updateFloor(){

    player.y =
    canvas.height - 205;

}

updateFloor();

/* START */

function startGame(){

    if(gameStarted) return;

    gameStarted = true;

    gameOver = false;

    showDead = false;

    score = 0;

    speed = 7;

    obstacles = [];

    updateFloor();

    startScreen.style.display = "none";

    gameOverUI.style.display = "none";

    leaderboardDiv.style.display = "none";

    music.currentTime = 0;
    music.play();

    sirene.currentTime = 0;
    sirene.play();

    spawnObstacle();

    loop();

}

/* START MOBILE */

startScreen.addEventListener("click",()=>{

    startGame();

});

startScreen.addEventListener("touchstart",(e)=>{

    e.stopPropagation();

    e.preventDefault();

    startGame();

},{ passive:false });

/* INPUT */

document.addEventListener("keydown",(e)=>{

    const typing =
    document.activeElement === nameInput;

    if(typing) return;

    if(
        e.code === "Space" ||
        e.code === "Enter"
    ){

        if(gameOver) return;

        if(!gameStarted){

            startGame();

        }else{

            jump();

        }

    }

});

canvas.addEventListener("touchstart",(e)=>{

    e.preventDefault();

    if(gameOver) return;

    if(!gameStarted){

        startGame();

    }else{

        jump();

    }

});

/* PULO */

function jump(){

    if(player.jumping) return;

    player.jumping = true;

    player.velocityY =
    mobile ? -22 : -23;

    jumpSound.currentTime = 0;

    jumpSound.play();

}

/* OBSTACULO */

function createObstacle(){

    obstacles.push({

        x:canvas.width,

        y:mobile
        ? canvas.height - 128
        : canvas.height - 182,

        width:mobile ? 122 : 132,

        height:mobile ? 132 : 108

    });

}

function spawnObstacle(){

    if(gameOver) return;

    createObstacle();

    let delay =

    1200 - (score * 2);

    delay = Math.max(450,delay);

    setTimeout(
        spawnObstacle,
        delay
    );

}

/* UPDATE */

function update(){

    if(gameOver) return;

    score += 0.12;

    speed = 7 + (score * 0.018);

    gravity =
    1.12 + (speed * 0.012);

    walkTimer++;

    if(walkTimer > 24){

        walkFrame =
        walkFrame === 0 ? 1 : 0;

        walkTimer = 0;

    }

    policeTimer++;

    if(policeTimer > 8){

        policeFrame =
        policeFrame === 0 ? 1 : 0;

        policeTimer = 0;

    }

    player.velocityY += gravity;

    player.y += player.velocityY;

    const floor =
    canvas.height - 205;

    if(player.y >= floor){

        player.y = floor;

        player.velocityY = 0;

        player.jumping = false;

    }

    obstacles.forEach(obstacle=>{

        obstacle.x -= speed;

        if(

            player.x + player.width - 58 > obstacle.x &&
            player.x + 58 < obstacle.x + obstacle.width - 45 &&
            player.y + player.height - 38 > obstacle.y

        ){

            endGame();

        }

    });

    obstacles =
    obstacles.filter(
        obstacle => obstacle.x > -300
    );

}

/* DRAW PLAYER */

function drawPlayer(){

    if(showDead){

        ctx.drawImage(

            deadImg,

            player.x - 35,

            player.y - 18,

            mobile ? 210 : 220,

            mobile ? 210 : 220

        );

        return;

    }

    if(player.jumping){

        ctx.drawImage(

            jumpImg,

            player.x,
            player.y,

            player.width,
            player.height

        );

        return;

    }

    const sprite =

    walkFrame === 0
    ? remo1Img
    : remo2Img;

    ctx.drawImage(

        sprite,

        player.x,
        player.y,

        player.width,
        player.height

    );

}

/* DRAW */

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    bgX -= speed * 0.45;

    if(bgX <= -canvas.width){

        bgX = 0;

    }

    ctx.drawImage(
        bgImg,
        bgX,
        0,
        canvas.width + 2,
        canvas.height
    );

    ctx.drawImage(
        bgImg,
        bgX + canvas.width,
        0,
        canvas.width + 2,
        canvas.height
    );

    obstacles.forEach(obstacle=>{

        const sprite =

        policeFrame === 0
        ? vt1
        : vt2;

        ctx.drawImage(

            sprite,

            obstacle.x,
            obstacle.y,

            obstacle.width,
            obstacle.height

        );

    });

    drawPlayer();

    ctx.fillStyle = "#fff";

    ctx.font =
    mobile
    ? "10px 'Press Start 2P'"
    : "18px 'Press Start 2P'";

    ctx.textAlign = "center";

    ctx.fillText(

        "SAFITA STREET",

        canvas.width / 2,

        mobile ? 40 : 50

    );

    ctx.textAlign = "left";

    ctx.fillText(

        "RESPEITO " +
        Math.floor(score),

        20,

        mobile ? 72 : 82

    );

}

/* GAME OVER */

function endGame(){

    if(gameOver) return;

    gameOver = true;

    gameStarted = false;

    showDead = true;

    music.pause();

    sirene.pause();

    hitSound.currentTime = 0;

    hitSound.play();

    cancelAnimationFrame(
        animationFrame
    );

    gameOverUI.style.display =
    "flex";

    leaderboardDiv.style.display =
    "block";

}

/* RESTART */

restartBtn.addEventListener(
"click",
()=>{

    gameOver = false;

    gameStarted = false;

    showDead = false;

    score = 0;

    obstacles = [];

    player.velocityY = 0;

    player.jumping = false;

    updateFloor();

    gameOverUI.style.display =
    "none";

    leaderboardDiv.style.display =
    "none";

    startScreen.style.display =
    "flex";

});

/* SHARE */

shareBtn.addEventListener(
"click",
()=>{

    const mensagem =

`🔥 Fiz ${Math.floor(score)} pontos no SAFITA STREET!

🎮 Joga agora:
https://safita-runner.netlify.app`;

    const url =

`https://wa.me/?text=${encodeURIComponent(mensagem)}`;

    window.open(
        url,
        "_blank"
    );

});

/* GANG */

gangBtn.addEventListener(
"click",
()=>{

    window.open(
        "https://wa.me/5511999999999",
        "_blank"
    );

});

/* LOOP */

function loop(){

    if(!gameStarted || gameOver){

        return;

    }

    update();

    draw();

    animationFrame =
    requestAnimationFrame(loop);

}

draw();

</script>

</body>
</html>
